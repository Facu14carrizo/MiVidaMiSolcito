<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a0a2e;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #hud {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            align-items: center;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(6px);
            border-radius: 30px;
            padding: 8px 24px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
        }

        #screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            pointer-events: all;
        }

        .screen-box {
            background: rgba(20, 5, 40, 0.88);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 180, 220, 0.35);
            border-radius: 24px;
            padding: 36px 48px;
            max-width: 480px;
            color: #fff;
        }

        .screen-box h1 {
            font-size: 2.2rem;
            margin-bottom: 8px;
            color: #ffb3d9;
        }

        .screen-box h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #ffb3d9;
        }

        .screen-box p {
            font-size: 1rem;
            line-height: 1.7;
            color: #f0d0ff;
            margin-bottom: 18px;
        }

        .btn {
            background: linear-gradient(135deg, #ff6eb4, #c44dff);
            border: none;
            border-radius: 50px;
            padding: 12px 36px;
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            pointer-events: all;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 18px rgba(255, 80, 180, 0.45);
            margin-top: 8px;
        }

        .btn:hover {
            transform: scale(1.06);
            box-shadow: 0 6px 24px rgba(255, 80, 180, 0.65);
        }

        .level-name {
            font-size: 0.85rem;
            color: #d0a0ff;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #msg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        #msg-box {
            background: rgba(20, 5, 40, 0.92);
            border: 2px solid rgba(255, 180, 220, 0.45);
            border-radius: 20px;
            padding: 28px 40px;
            max-width: 400px;
            color: #fff;
            text-align: center;
            font-size: 1.05rem;
            line-height: 1.7;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            from {
                transform: scale(0.7);
                opacity: 0
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        #controls-hint {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>
    <div id="ui">
        <div id="hud" style="display:none">
            <span id="level-label">Nivel 1</span>
            <span>💛 <span id="score">0</span> / <span id="total">0</span></span>
        </div>
        <div id="screen">
            <div class="screen-box">
                <div style="font-size:2.8rem;margin-bottom:12px">💛</div>
                <h1>El Mundo de Sol</h1>
                <p style="font-size:0.95rem;margin-bottom:6px">Un regalo especial para vos,<br>por nuestros 2 años
                    juntos ✨</p>
                <p>Recolectá los corazones en cada nivel<br>para descubrir mensajes especiales.</p>
                <p style="font-size:0.82rem;color:#c090e0">← → para moverse &nbsp;•&nbsp; ↑ o Espacio para saltar</p>
                <button class="btn" onclick="startGame()">Comenzar aventura 💕</button>
            </div>
        </div>
        <div id="msg-overlay">
            <div id="msg-box"></div>
        </div>
        <div id="controls-hint">↑ / Espacio = saltar &nbsp;|&nbsp; ← → = moverse</div>
    </div>
    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resize(); window.addEventListener('resize', resize);

        const LEVELS = [
            {
                name: 'Jardín Mágico',
                bg: ['#1a0a2e', '#2d1060', '#4a1a80'],
                ground: '#5a2d8a', platColor: '#8a4fcc',
                msg: '💛 Desde el primer día, tu sonrisa iluminó mi mundo como el sol que sos.\nCada momento a tu lado es el más hermoso de mi vida.',
                emoji: '🌸'
            },
            {
                name: 'Ciudad entre Nubes',
                bg: ['#0a1a3e', '#1a3060', '#2a4880'],
                ground: '#2a4880', platColor: '#4a7ac0',
                msg: '✨ Dos años de risas, de aventuras y de crecer juntos.\nNo cambiaría ni un solo segundo de todo lo que vivimos.',
                emoji: '☁️'
            },
            {
                name: 'Playa al Atardecer',
                bg: ['#3a1a00', '#7a3a00', '#c06010'],
                ground: '#c06010', platColor: '#e08830',
                msg: '🌅 Sol, sos la persona más especial que conocí.\nGracias por existir y por elegirme cada día.\n\n¡Felices 2 años, mi amor! 💕',
                emoji: '🌺'
            }
        ];

        const MINI_MSGS = [
            'Sos la luz de mis días ☀️',
            'Me hacés la persona más feliz 🥰',
            'Cada día me enamoro más 💫',
            'Tu risa es mi canción favorita 🎵',
            'Gracias por existir, Sol 💛',
            'Mi persona favorita del mundo 🌍',
            'Mi corazón late por vos ❤️',
            'Juntos somos invencibles ✨',
            'Sos mi razón para sonreír 😊',
            'Para siempre sos vos 🌹',
        ];

        let state = 'menu';
        let level = 0;
        let player, platforms, hearts, particles, stars, clouds;
        let keys = {};
        let heartsCollected = 0, totalHearts = 0;
        let cameraX = 0;
        let showingMsg = false, msgTimer = 0;

        function startGame() {
            document.getElementById('screen').style.display = 'none';
            document.getElementById('hud').style.display = 'flex';
            loadLevel(0);
            state = 'playing';
            if (!loopRunning) loop();
        }

        function loadLevel(lv) {
            level = lv;
            document.getElementById('level-label').textContent = LEVELS[lv].name;
            heartsCollected = 0;

            const WORLD_W = 1800;

            player = { x: 100, y: 0, w: 34, h: 46, vx: 0, vy: 0, onGround: false, facingRight: true, frame: 0, ft: 0 };

            // Floor + wide easy platforms — lower, closer together
            platforms = [
                { x: 0, y: H - 70, w: WORLD_W, h: 70, ground: true },
                { x: 220, y: H - 170, w: 160, h: 18 },
                { x: 460, y: H - 200, w: 160, h: 18 },
                { x: 700, y: H - 170, w: 160, h: 18 },
                { x: 940, y: H - 230, w: 160, h: 18 },
                { x: 1180, y: H - 190, w: 160, h: 18 },
                { x: 1420, y: H - 220, w: 160, h: 18 },
                { x: 1640, y: H - 170, w: 160, h: 18 },
            ];

            // Hearts — 1 per platform + a few on ground level
            hearts = [];
            platforms.forEach((p, i) => {
                if (!p.ground) {
                    hearts.push({
                        x: p.x + p.w / 2, y: p.y - 38,
                        collected: false, float: i * 0.8,
                        msg: MINI_MSGS[i % MINI_MSGS.length]
                    });
                }
            });
            // 2 extra on the ground
            hearts.push({ x: 340, y: H - 120, collected: false, float: 2.1, msg: MINI_MSGS[7] });
            hearts.push({ x: 840, y: H - 120, collected: false, float: 4.3, msg: MINI_MSGS[8] });

            totalHearts = hearts.length;
            document.getElementById('total').textContent = totalHearts;
            document.getElementById('score').textContent = 0;

            particles = [];
            stars = Array.from({ length: 90 }, () => ({
                x: Math.random() * WORLD_W, y: Math.random() * (H * 0.7),
                r: Math.random() * 2 + 0.5, tw: Math.random() * Math.PI * 2,
                sp: Math.random() * 0.025 + 0.008
            }));
            clouds = Array.from({ length: 14 }, () => ({
                x: Math.random() * WORLD_W, y: Math.random() * (H * 0.38) + 20,
                w: 90 + Math.random() * 130, h: 32 + Math.random() * 28, sp: 0.18 + Math.random() * 0.18
            }));

            cameraX = 0;
            player.y = H - 70 - player.h;
        }

        let loopRunning = false;
        function loop() {
            loopRunning = true;
            requestAnimationFrame(loop);
            if (state === 'playing') update();
            draw();
        }

        function update() {
            const WORLD_W = 1800;
            const left = keys['ArrowLeft'] || keys['a'] || keys['A'];
            const right = keys['ArrowRight'] || keys['d'] || keys['D'];
            const jump = keys['ArrowUp'] || keys['w'] || keys['W'] || keys[' '];

            const speed = 5.2;
            if (left) { player.vx = -speed; player.facingRight = false; }
            else if (right) { player.vx = speed; player.facingRight = true; }
            else player.vx *= 0.75;

            if (jump && player.onGround) { player.vy = -12; player.onGround = false; }

            player.vy = Math.min(player.vy + 0.52, 18);
            player.x += player.vx;
            player.y += player.vy;

            player.ft++;
            if (player.ft > 7) { player.frame = (player.frame + 1) % 4; player.ft = 0; }

            player.onGround = false;
            platforms.forEach(p => {
                if (player.x + player.w > p.x && player.x < p.x + p.w &&
                    player.y + player.h > p.y && player.y + player.h < p.y + p.h + 18 && player.vy >= 0) {
                    player.y = p.y - player.h; player.vy = 0; player.onGround = true;
                }
            });

            player.x = Math.max(0, Math.min(player.x, WORLD_W - player.w));
            if (player.y > H + 60) { player.y = platforms[0].y - player.h; player.x = 100; player.vx = 0; player.vy = 0; }

            const targetCam = player.x - W / 3;
            cameraX += (targetCam - cameraX) * 0.1;
            cameraX = Math.max(0, Math.min(cameraX, WORLD_W - W));

            hearts.forEach((h, i) => {
                if (h.collected) return;
                h.float += 0.045;
                const hy = h.y + Math.sin(h.float) * 6;
                if (player.x < h.x + 22 && player.x + player.w > h.x - 22 &&
                    player.y < hy + 22 && player.y + player.h > hy - 22) {
                    h.collected = true;
                    heartsCollected++;
                    document.getElementById('score').textContent = heartsCollected;
                    spawnParticles(h.x - cameraX, hy, '#ff4499', 18);
                    if (!showingMsg) showMsg(h.msg);
                }
            });

            clouds.forEach(c => { c.x -= c.sp; if (c.x + c.w < 0) c.x = WORLD_W; });
            stars.forEach(s => s.tw += s.sp);
            particles = particles.filter(p => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.life--; return p.life > 0;
            });

            if (heartsCollected >= totalHearts && totalHearts > 0) {
                totalHearts = 0; state = 'levelend';
                setTimeout(showLevelEnd, 500);
            }
        }

        function spawnParticles(x, y, color, n) {
            for (let i = 0; i < n; i++) particles.push({
                x, y, vx: (Math.random() - 0.5) * 6, vy: Math.random() * -7 - 1,
                life: 45 + Math.random() * 20, color, r: 4 + Math.random() * 5
            });
        }

        function showMsg(msg) {
            showingMsg = true;
            const el = document.getElementById('msg-overlay');
            document.getElementById('msg-box').innerHTML = msg.replace(/\n/g, '<br>');
            el.style.display = 'flex';
            clearTimeout(msgTimer);
            msgTimer = setTimeout(() => { el.style.display = 'none'; showingMsg = false; }, 2800);
        }

        function showLevelEnd() {
            const ld = LEVELS[level];
            document.getElementById('screen').style.display = 'flex';
            document.getElementById('screen').innerHTML = `
    <div class="screen-box">
      <div style="font-size:2.4rem;margin-bottom:10px">${ld.emoji}</div>
      <div class="level-name">${ld.name} completado</div>
      <h2 style="margin:12px 0 16px">¡Nivel completado! ✨</h2>
      <p>${ld.msg.replace(/\n/g, '<br>')}</p>
      ${level < LEVELS.length - 1
                    ? `<button class="btn" onclick="nextLevel()">Siguiente nivel 💕</button>`
                    : `<button class="btn" onclick="finalScreen()">Ver dedicatoria final 💛</button>`}
    </div>`;
        }

        function nextLevel() {
            document.getElementById('screen').style.display = 'none';
            loadLevel(level + 1);
            state = 'playing';
        }

        function finalScreen() {
            document.getElementById('hud').style.display = 'none';
            document.getElementById('screen').style.display = 'flex';
            document.getElementById('screen').innerHTML = `
    <div class="screen-box" style="max-width:520px">
      <div style="font-size:3rem;margin-bottom:12px">💛</div>
      <h1 style="font-size:1.8rem;margin-bottom:16px">Para Sol, con todo mi amor</h1>
      <p style="font-size:1.05rem;line-height:1.8">
        Dos años a tu lado fueron los mejores de mi vida.<br><br>
        Cada día que pasa, me convenzo más de lo afortunado que soy<br>
        de tenerte a vos. Tu luz, tu risa, tu forma de ser<br>
        hacen que todo sea más bonito.<br><br>
        Gracias por elegirme cada día, Sol. 🌸<br><br>
        <strong style="color:#ffb3d9;font-size:1.2rem">¡Felices 2 años, mi amor! 🎉💕</strong>
      </p>
      <button class="btn" style="margin-top:20px" onclick="location.reload()">Jugar de nuevo 🔁</button>
    </div>`;
            state = 'end';
            launchConfetti();
        }

        function launchConfetti() {
            if (state !== 'end') return;
            const cols = ['#ff80c0', '#c44dff', '#ffcc00', '#ff6060', '#80ffcc', '#6699ff'];
            for (let i = 0; i < 180; i++) particles.push({
                x: Math.random() * W, y: -10,
                vx: (Math.random() - 0.5) * 5, vy: Math.random() * 3 + 1.5,
                life: 200 + Math.random() * 80, color: cols[Math.floor(Math.random() * cols.length)], r: 5 + Math.random() * 5
            });
            setTimeout(launchConfetti, 2000);
        }

        // ── DRAW ──────────────────────────────────────────────────────────────────────
        function draw() {
            ctx.clearRect(0, 0, W, H);
            const ld = LEVELS[Math.min(level, LEVELS.length - 1)];

            // Sky
            const sky = ctx.createLinearGradient(0, 0, 0, H);
            sky.addColorStop(0, ld.bg[0]); sky.addColorStop(0.5, ld.bg[1]); sky.addColorStop(1, ld.bg[2]);
            ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

            // Stars
            stars.forEach(s => {
                const a = 0.35 + 0.65 * Math.abs(Math.sin(s.tw));
                ctx.fillStyle = `rgba(255,255,220,${a})`;
                ctx.beginPath(); ctx.arc(s.x - cameraX * 0.25, s.y, s.r, 0, Math.PI * 2); ctx.fill();
            });

            // Clouds
            clouds.forEach(c => {
                ctx.fillStyle = 'rgba(255,255,255,0.13)';
                const cx = c.x - cameraX * 0.45;
                ctx.beginPath();
                ctx.ellipse(cx, c.y, c.w * 0.55, c.h * 0.5, 0, 0, Math.PI * 2);
                ctx.ellipse(cx + c.w * 0.18, c.y - c.h * 0.2, c.w * 0.38, c.h * 0.42, 0, 0, Math.PI * 2);
                ctx.ellipse(cx - c.w * 0.22, c.y - c.h * 0.15, c.w * 0.32, c.h * 0.38, 0, 0, Math.PI * 2);
                ctx.fill();
            });

            // Platforms
            platforms.forEach(p => {
                const px = p.x - cameraX;
                if (p.ground) {
                    ctx.fillStyle = ld.ground; ctx.fillRect(px, p.y, p.w, p.h);
                    ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fillRect(px, p.y, p.w, 4);
                } else {
                    // Shadow
                    ctx.fillStyle = 'rgba(0,0,0,0.25)';
                    ctx.beginPath(); ctx.roundRect(px + 4, p.y + 6, p.w, p.h, 9); ctx.fill();
                    // Platform body
                    ctx.fillStyle = ld.platColor;
                    ctx.beginPath(); ctx.roundRect(px, p.y, p.w, p.h, 9); ctx.fill();
                    // Shine
                    ctx.fillStyle = 'rgba(255,255,255,0.22)';
                    ctx.beginPath(); ctx.roundRect(px + 6, p.y + 3, p.w - 12, 5, 4); ctx.fill();
                }
            });

            // Hearts
            hearts.forEach((h, i) => {
                if (h.collected) return;
                const hx = h.x - cameraX;
                const hy = h.y + Math.sin(h.float) * 6;
                drawBigHeart(hx, hy, 26);
            });

            // Player
            drawPlayer();

            // Particles
            particles.forEach(p => {
                ctx.globalAlpha = Math.min(1, p.life / 40);
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        function drawBigHeart(x, y, s) {
            // Outer glow
            ctx.save();
            ctx.shadowColor = '#ff2277';
            ctx.shadowBlur = 18;

            // Gradient fill
            const grad = ctx.createRadialGradient(x, y - s * 0.1, s * 0.2, x, y, s * 1.2);
            grad.addColorStop(0, '#ff88cc');
            grad.addColorStop(0.5, '#ff2277');
            grad.addColorStop(1, '#aa0044');
            ctx.fillStyle = grad;

            // Heart shape (path)
            const hs = s;
            ctx.beginPath();
            ctx.moveTo(x, y + hs * 0.35);
            ctx.bezierCurveTo(x, y + hs * 0.05, x - hs * 0.5, y - hs * 0.55, x - hs, y - hs * 0.1);
            ctx.bezierCurveTo(x - hs * 1.5, y + hs * 0.35, x - hs * 0.9, y + hs * 1.0, x, y + hs * 1.4);
            ctx.bezierCurveTo(x + hs * 0.9, y + hs * 1.0, x + hs * 1.5, y + hs * 0.35, x + hs, y - hs * 0.1);
            ctx.bezierCurveTo(x + hs * 0.5, y - hs * 0.55, x, y + hs * 0.05, x, y + hs * 0.35);
            ctx.fill();

            // Shine
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255,255,255,0.55)';
            ctx.beginPath();
            ctx.ellipse(x - hs * 0.28, y - hs * 0.02, hs * 0.22, hs * 0.13, -0.6, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            // Sparkles around heart
            const t = Date.now() * 0.002;
            for (let i = 0; i < 4; i++) {
                const ang = t + i * Math.PI * 0.5;
                const rx = x + Math.cos(ang) * (s * 1.7);
                const ry = y + Math.sin(ang) * (s * 1.4);
                const sa = 0.5 + 0.5 * Math.sin(t * 3 + i);
                ctx.fillStyle = `rgba(255,220,100,${sa})`;
                ctx.beginPath(); ctx.arc(rx, ry, 2.5, 0, Math.PI * 2); ctx.fill();
            }
        }

        function drawPlayer() {
            const p = player;
            const px = p.x - cameraX, py = p.y;
            const bob = p.onGround ? Math.sin(p.frame * 1.6) * 2 : 0;
            const moving = Math.abs(p.vx) > 0.5;
            const legSwing = moving && p.onGround ? Math.sin(p.frame * 1.6) * 10 : 0;

            ctx.save();
            if (!p.facingRight) {
                ctx.translate(px + p.w / 2, py + p.h / 2 + bob);
                ctx.scale(-1, 1);
                ctx.translate(-(px + p.w / 2), -(py + p.h / 2 + bob));
            }

            const cx = px + p.w / 2, cy = py + bob;

            // Legs
            ctx.fillStyle = '#993377';
            ctx.beginPath(); ctx.roundRect(cx - 13, cy + 32, 11, 16 + legSwing * 0.4, 5); ctx.fill();
            ctx.beginPath(); ctx.roundRect(cx + 2, cy + 32, 11, 16 - legSwing * 0.4, 5); ctx.fill();
            // Shoes
            ctx.fillStyle = '#ff3388';
            ctx.beginPath(); ctx.roundRect(cx - 15, cy + 46 + legSwing * 0.4, 14, 7, 4); ctx.fill();
            ctx.beginPath(); ctx.roundRect(cx, cy + 46 - legSwing * 0.4, 14, 7, 4); ctx.fill();

            // Dress / body
            const dg = ctx.createLinearGradient(cx - 14, cy + 14, cx + 14, cy + 32);
            dg.addColorStop(0, '#ff80cc'); dg.addColorStop(1, '#cc44aa');
            ctx.fillStyle = dg;
            ctx.beginPath(); ctx.roundRect(cx - 14, cy + 14, 28, 22, 8); ctx.fill();
            // Dress skirt flare
            ctx.fillStyle = '#ff80cc';
            ctx.beginPath();
            ctx.moveTo(cx - 14, cy + 28); ctx.lineTo(cx - 18, cy + 40); ctx.lineTo(cx + 18, cy + 40); ctx.lineTo(cx + 14, cy + 28);
            ctx.fill();
            // Collar detail
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.beginPath(); ctx.ellipse(cx, cy + 16, 9, 4, 0, 0, Math.PI * 2); ctx.fill();

            // Arms
            ctx.fillStyle = '#ffe0b0';
            ctx.beginPath(); ctx.roundRect(cx - 20, cy + 16, 7, 18, 4); ctx.fill();
            ctx.beginPath(); ctx.roundRect(cx + 13, cy + 16, 7, 18, 4); ctx.fill();

            // Neck
            ctx.fillStyle = '#ffe0b0';
            ctx.beginPath(); ctx.roundRect(cx - 5, cy + 8, 10, 10, 3); ctx.fill();

            // Head
            ctx.fillStyle = '#ffe0b0';
            ctx.beginPath(); ctx.arc(cx, cy + 2, 15, 0, Math.PI * 2); ctx.fill();

            // Dark hair — back layer
            ctx.fillStyle = '#2a1a00';
            ctx.beginPath();
            ctx.ellipse(cx, cy - 9, 16, 9, 0, Math.PI, 0); ctx.fill();
            ctx.beginPath(); ctx.arc(cx - 12, cy - 2, 7, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(cx + 12, cy - 2, 7, 0, Math.PI * 2); ctx.fill();
            // Hair bangs
            ctx.beginPath(); ctx.arc(cx - 6, cy - 10, 6, Math.PI, 0); ctx.fill();
            ctx.beginPath(); ctx.arc(cx + 6, cy - 10, 6, Math.PI, 0); ctx.fill();
            // Long hair strands falling behind body
            ctx.beginPath();
            ctx.moveTo(cx - 14, cy + 2);
            ctx.bezierCurveTo(cx - 18, cy + 12, cx - 20, cy + 28, cx - 18, cy + 40);
            ctx.lineWidth = 7; ctx.strokeStyle = '#2a1a00'; ctx.stroke();
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(cx + 14, cy + 2);
            ctx.bezierCurveTo(cx + 18, cy + 12, cx + 20, cy + 28, cx + 18, cy + 40);
            ctx.lineWidth = 7; ctx.strokeStyle = '#2a1a00'; ctx.stroke();
            ctx.lineWidth = 1;
            // Hair highlight
            ctx.fillStyle = 'rgba(120,80,0,0.35)';
            ctx.beginPath(); ctx.ellipse(cx + 3, cy - 11, 7, 3, -0.4, 0, Math.PI * 2); ctx.fill();

            // Eyes
            ctx.fillStyle = '#2a1a00';
            ctx.beginPath(); ctx.ellipse(cx - 5, cy + 1, 3.5, 4, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(cx + 5, cy + 1, 3.5, 4, 0, 0, Math.PI * 2); ctx.fill();
            // Eye shine
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(cx - 4, cy - 0.5, 1.3, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(cx + 6, cy - 0.5, 1.3, 0, Math.PI * 2); ctx.fill();
            // Blush
            ctx.fillStyle = 'rgba(255,100,120,0.35)';
            ctx.beginPath(); ctx.ellipse(cx - 9, cy + 5, 5, 3, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(cx + 9, cy + 5, 5, 3, 0, 0, Math.PI * 2); ctx.fill();
            // Smile
            ctx.strokeStyle = '#cc5566'; ctx.lineWidth = 1.8;
            ctx.beginPath(); ctx.arc(cx, cy + 5, 5, 0.2, Math.PI - 0.2); ctx.stroke();
            ctx.lineWidth = 1;

            ctx.restore();
        }

        // ── INPUT ─────────────────────────────────────────────────────────────────────
        window.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();
        });
        window.addEventListener('keyup', e => keys[e.key] = false);

        let touchStart = { x: 0, y: 0 };
        window.addEventListener('touchstart', e => {
            touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            if (e.touches[0].clientY < H * 0.65) keys[' '] = true;
        }, { passive: true });
        window.addEventListener('touchend', () => {
            keys[' '] = false; keys['ArrowLeft'] = false; keys['ArrowRight'] = false;
        }, { passive: true });
        window.addEventListener('touchmove', e => {
            const dx = e.touches[0].clientX - touchStart.x;
            keys['ArrowLeft'] = dx < -25; keys['ArrowRight'] = dx > 25;
        }, { passive: true });

        // Boot: draw stars on menu
        stars = Array.from({ length: 90 }, () => ({
            x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight,
            r: Math.random() * 2 + 0.5, tw: Math.random() * Math.PI * 2, sp: 0.015
        }));
        clouds = Array.from({ length: 10 }, () => ({
            x: Math.random() * window.innerWidth, y: Math.random() * (window.innerHeight * 0.4) + 20,
            w: 90 + Math.random() * 130, h: 32 + Math.random() * 28, sp: 0.2
        }));
        platforms = []; particles = []; hearts = [];
        level = 0;
        (function menuLoop() {
            if (state === 'menu') {
                ctx.clearRect(0, 0, W, H);
                const ld = LEVELS[0];
                const sky = ctx.createLinearGradient(0, 0, 0, H);
                sky.addColorStop(0, ld.bg[0]); sky.addColorStop(0.5, ld.bg[1]); sky.addColorStop(1, ld.bg[2]);
                ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);
                stars.forEach(s => {
                    s.tw += s.sp;
                    const a = 0.35 + 0.65 * Math.abs(Math.sin(s.tw));
                    ctx.fillStyle = `rgba(255,255,220,${a})`;
                    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
                });
                requestAnimationFrame(menuLoop);
            }
        })();
    </script>
</body>

</html>
